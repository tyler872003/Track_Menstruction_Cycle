name: bloom_cycle
description: "Bloom - Menstrual Cycle Tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.7

  # UI & Fonts
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.5

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  table_calendar: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
